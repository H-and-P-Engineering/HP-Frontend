<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sign up with Google | Housing and Property</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Sans Flex -->
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="icon" type="image/png" href="img/logan.png">

  <style>
    html, body, * {
      font-family: 'Google Sans Flex', ui-sans-serif, sans-serif !important;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden; /* prevent scrolling */
    }
  </style>
</head>
<body class="min-h-screen fixed w-full bg-gray-900">

  <div class="relative min-h-screen w-full bg-cover bg-center" style="background-image: url('img/ho.jpg');">
    <!-- Dark overlay to make background darker -->
    <div class="absolute inset-0 bg-black/80"></div>

    <!-- Logo -->
    <div class="absolute top-5 left-5 md:top-10 md:left-10 z-20">
      <div class="w-12 h-12 flex items-center justify-center">
        <img src="img/logan.png" alt="HP Logo" class="w-full h-full object-contain">
      </div>
    </div>

    <!-- Centered signup panel -->
    <div class="absolute inset-0 z-20 flex items-center justify-center px-4 sm:px-6">
  <div class="w-full max-w-lg rounded-2xl bg-white/95 backdrop-blur-lg shadow-xl p-6 sm:p-8 md:p-10">
    <h2 class="text-2xl sm:text-3xl font-normal mb-2 text-gray-900 text-center">Sign up with Google</h2>
    <p class="text-sm text-gray-700 mb-6 text-center">Kindly provide your phone number</p>
    <form id="googleSignupForm" class="space-y-5">
      <!-- Email field -->
      <div>
        <label class="block text-xs text-gray-600 mb-1 font-medium">Email Address</label>
        <input type="email" value="frednickingoper@gmail.com" readonly 
          class="w-full rounded-md border border-gray-300 bg-gray-100 px-4 py-3 text-sm text-gray-900 placeholder-gray-400 outline-none focus:ring-2 focus:ring-blue-300 focus:border-blue-500 transition" />
      </div>
      <!-- Phone number field -->
      <div>
        <label class="block text-xs text-gray-600 mb-1 font-medium">Phone number</label>
        <input type="tel" placeholder="Enter your phone number" required
          class="w-full rounded-md border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 outline-none focus:ring-2 focus:ring-blue-300 focus:border-blue-500 transition" />
      </div>
      <!-- Submit button -->
      <button type="submit" class="w-full rounded-full py-3 mt-4 bg-[#14375a] text-white font-medium text-sm hover:bg-[#1b4676] transition shadow-inner">
        Sign up
      </button>
    </form>
  </div>
</div>

  </div>

  <!-- JS: demo form submission -->
  <script>
    document.getElementById('googleSignupForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert('Sign up submitted (demo).');
    });
  </script>
</body>
</html>
