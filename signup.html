<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Create Account | Housing and Property </title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Sans Flex -->
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="icon" type="image/png" href="img/logan.png">

  <style>
    html, body, * {
      font-family: 'Google Sans Flex', ui-sans-serif, sans-serif !important;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-900">

  <div class="relative min-h-screen w-full bg-cover bg-center" style="background-image: url('img/ho.jpg');">
    <!-- Overlay gradient -->
    <div class="absolute inset-0 bg-black/80"></div>

    <div class="relative z-10 flex flex-col min-h-screen">
      <!-- Header/logo -->
     <div class="p-5 md:p-10">
        <div class="w-10 h-10 flex items-center justify-center  font-bold text-white text-sm tracking-tight">
            <img src="img/logan.png" alt="HP Logo" class="w-full h-full object-contain">
        </div>
      </div>

      <div class="flex-1 flex flex-col lg:flex-row items-center justify-center lg:justify-start max-w-6xl mx-auto lg:mx-0">

        <!-- Left hero text (hidden on mobile) -->
        <div class="hidden lg:flex flex-1 items-center justify-center px-10">
          <h1 class="text-white text-[2.6rem] xl:text-[3rem] font-light leading-tight drop-shadow-lg mt-12">
            Sign up<br>and secure your<br>ideal apartment<br>effortlessly.
          </h1>
        </div>

        <!-- Right sign up panel: always visible, centered on mobile -->
        <div class="flex-1 flex px-2 sm:px-8 py-8">
  <div class="w-full max-w-lg bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl px-6 sm:px-10 py-10 shadow-lg">
    <h2 class="text-2xl sm:text-3xl font-light text-white text-center mb-2">Create Account</h2>
    <p class="text-sm text-gray-200 text-center mb-6">
      Join our community of property seekers, agents, and vendors.<br>
      It only takes a minute to get started
    </p>
    <form id="signupForm" class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-gray-300 mb-1">Full Name</label>
          <input type="text" id="fullname" class="w-full rounded-lg border border-white/10 bg-white/0 px-4 py-3 text-xs sm:text-sm text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white/20" placeholder="Enter your name"/>
        </div>
        <div>
          <label class="block text-xs text-gray-300 mb-1">Email Address</label>
          <input type="email" id="email" class="w-full rounded-lg border border-white/10 bg-white/0 px-4 py-3 text-xs sm:text-sm text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white/20" placeholder="Enter your email"/>
        </div>
      </div>
      <div>
        <label class="block text-xs text-gray-300 mb-1">Phone number</label>
        <input type="tel" id="phone" class="w-full rounded-lg border border-white/10 bg-white/0 px-4 py-3 text-xs sm:text-sm text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white/20" placeholder="Enter your phone number"/>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-gray-300 mb-1">Password</label>
          <input type="password" id="password" class="w-full rounded-lg border border-white/10 bg-white/0 px-4 py-3 text-xs sm:text-sm text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white/20" placeholder="Enter your password"/>
        </div>
        <div>
          <label class="block text-xs text-gray-300 mb-1">Confirm Password</label>
          <input type="password" id="confirm-password" class="w-full rounded-lg border border-white/10 bg-white/0 px-4 py-3 text-xs sm:text-sm text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-white/20" placeholder="Confirm password"/>
        </div>
      </div>
      <div>
        <label class="block text-xs text-gray-300 mb-1">Role Selection</label>
        <select id="role" class="w-full rounded-lg border border-white/10 bg-white/0 px-4 py-3 text-xs sm:text-sm text-white focus:outline-none focus:ring-2 focus:ring-white/20">
          <option value="">Select a role</option>
          <option>Seeker</option>
          <option>Agent</option>
          <option>Vendor</option>
        </select>
      </div>
      <button type="submit" class="w-full mt-2 py-3 rounded-full bg-white text-black font-semibold shadow-sm hover:bg-gray-100 transition text-sm">
        Sign up
      </button>
      <div class="flex items-center gap-3 my-4">
        <div class="h-px bg-white/20 flex-1"></div>
        <span class="text-xs text-gray-300 font-normal">OR</span>
        <div class="h-px bg-white/20 flex-1"></div>
      </div>
      <button type="button" id="googleBtn"
        class="w-full flex items-center justify-center gap-2 py-2.5 rounded-lg border border-white/20 bg-white/10 text-white hover:bg-white/20 transition text-sm font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.19 1.52 8.07 2.8l6-6C35.55 3.12 30.9 1 24 1 14.98 1 7.54 6.74 4.1 14.5l7.46 5.8C13.2 15.05 18.13 9.5 24 9.5z"/><path fill="#34A853" d="M46.5 24.5c0-1.53-.12-2.68-.37-3.86H24v7.25h12.87c-.55 3-2.7 6.1-6.47 8l6.28 4.86C43.76 37.82 46.5 31.71 46.5 24.5z"/><path fill="#4A90E2" d="M11.56 28.3A14.7 14.7 0 0111 24.5c0-1.67.28-3.28.78-4.78L4.31 13.92A23.98 23.98 0 001 24.5c0 3.36.8 6.53 2.31 9.33l8.24-5.53z"/><path fill="#FBBC05" d="M24 46.5c6.9 0 11.55-2.12 15.62-5.77l-7.46-5.8C30.19 34.22 27.6 35 24 35c-5.87 0-10.8-5.55-12.44-13.08l-7.46 5.8C7.54 41.76 14.98 46.5 24 46.5z"/></svg>
        <span>Google</span>
      </button>
      <p class="text-center text-xs text-gray-300 mt-6">
        Already have an account? <a href="#login" class="text-white font-medium hover:text-gray-100">Log in</a>
      </p>
    </form>
  </div>
</div>

      </div>
    </div>
  </div>

  <!-- Demo JS: password, Google, and links -->
  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert('Sign up form submitted (demo).');
    });
    document.getElementById('googleBtn').addEventListener('click', function(){
      alert('Google Sign-Up (demo)');
    });
    document.querySelector('a[href="#login"]').addEventListener('click', function(e){
      e.preventDefault();
      alert('Go to Login page (demo)');
    });
  </script>
</body>
</html>
