<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Verify your email | Housing and Property</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Sans Flex -->
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap" rel="stylesheet">
          <link rel="icon" type="image/png" href="img/logan.png">

  <style>
    html, body, * {
      font-family: 'Google Sans Flex', ui-sans-serif, sans-serif !important;
    }
    /* Hide spinner-arrows from type=number */

  </style>
</head>
<body class="min-h-screen bg-gray-900">
  <!-- Background: the previous sign-up page blurred with overlay -->
  <div class="relative min-h-screen w-full bg-cover bg-center" style="background-image: url('img/create.png');">
    <!-- Dark overlay to make background darker -->
    <div class="absolute inset-0 bg-black/50"></div>
    <!-- Logo -->
    <div class="absolute top-6 left-6 z-20">
      <div class="w-10 h-10 flex items-center justify-center  font-bold text-white text-sm tracking-tight">
      </div>
    </div>

    <!-- Centered Panel -->
    <div class="relative z-10 flex items-center justify-center min-h-screen px-2 sm:px-0">
      <form class="bg-white/95 w-full max-w-xl rounded-2xl shadow-xl p-6 md:p-10 flex flex-col items-center" id="verifyCodeForm" autocomplete="off">
        <h2 class="text-2xl font-medium mb-2 text-gray-900 w-full text-left">Verify your email</h2>
        <p class="text-sm text-gray-700 mb-7 w-full text-left">
          An email with a verification code has been sent to *******gmail.com.<br>
          Kindly check your email and provide the code
        </p>
        <div class="flex items-center justify-center gap-3 mb-12 w-full">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
                 class="w-12 h-12 md:w-14 md:h-14 border border-gray-300 bg-white rounded-lg text-center text-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition codebox" required />
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
                 class="w-12 h-12 md:w-14 md:h-14 border border-gray-300 bg-white rounded-lg text-center text-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition codebox" required />
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
                 class="w-12 h-12 md:w-14 md:h-14 border border-gray-300 bg-white rounded-lg text-center text-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition codebox" required />
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
                 class="w-12 h-12 md:w-14 md:h-14 border border-gray-300 bg-white rounded-lg text-center text-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition codebox" required />
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
                 class="w-12 h-12 md:w-14 md:h-14 border border-gray-300 bg-white rounded-lg text-center text-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition codebox" required />
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
                 class="w-12 h-12 md:w-14 md:h-14 border border-gray-300 bg-white rounded-lg text-center text-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition codebox" required />
        </div>
        <button type="submit" class="w-full rounded-full py-3 bg-[#14375a] text-white font-medium text-sm hover:bg-[#1b4676] transition shadow-inner">
          Verify
        </button>
      </form>
    </div>
  </div>
  <script>
    // Focus auto-move for OTP inputs
    document.querySelectorAll('.codebox').forEach((input, idx, arr) => {
      input.addEventListener('input', (e) => {
        if(e.inputType === 'deleteContentBackward' && !input.value && idx > 0) {
          arr[idx - 1].focus();
        } else if(input.value && idx < arr.length - 1) {
          arr[idx + 1].focus();
        }
      });
      input.addEventListener('keydown', (e) => {
        if(e.key === 'Backspace' && !input.value && idx > 0) {
          arr[idx - 1].focus();
        }
      });
    });

    document.getElementById('verifyCodeForm').addEventListener('submit', function(e){
      e.preventDefault();
      let code = '';
      document.querySelectorAll('.codebox').forEach(inp => code += inp.value.trim());
      if (code.length !== 6 || !/^\d{6}$/.test(code)) {
        alert('Please enter the 6-digit verification code.');
        return;
      }
      alert('Code entered: ' + code);
    });
  </script>
</body>
</html>
