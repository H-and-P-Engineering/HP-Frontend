{% extends "layout.html" %}

{% block body %}

    <title>Housing&Properties Login Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
      font-family: 'Merriweather', serif;
    }

    .container {
      display: flex;
      flex-direction: row;
      height: 100vh;
    }

    .image-section {
      flex: 1;
      background: url('img/coffee.jpg') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    

    .login-form {
      max-width: 400px;
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
    }

    h1 {
      margin-bottom: 1rem;
      font-size: 2rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.8rem;
      margin: 0.5rem 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .checkbox {
      margin: 0.5rem 0;
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background-color: #0d0d22;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 1rem 0;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
    }

    .signup {
      text-align: center;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
    }

    .social-login {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .social-login img {
      width: 32px;
      height: 32px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .image-section {
        height: 40vh;
      }
    }
  </style>

    <body>
        <div class="container">
            <div class="image-section">
                <img src="{{ url_for ('static', filename='signupimg2.jpg') }}" alt="Subway scene">
            </div>
            <div class="form-section">
                <div class="login-form">
                    <h1>Login</h1>
                    <p>Login your account in a second</p>
                    <input type="email" placeholder="Email Address" />
                    <input type="password" placeholder="Password" />
                    <div class="phone-group">
                        <select name="countryCode">
                            <option value="+234" selected>🇳🇬 +234</option>
                        </select>
                        <input type="tel" name="phone" placeholder="Phone Number" id="phone_number"/>
                    </div>

                    <div class="checkbox">
                        <label><input type="checkbox" checked /> Keep me logged in</label>
                        <a href="#">Forgot password?</a>
                    </div>

                    <button>Log in</button>
                    <div class="signup">Don't have an account? <a href="index.html">Sign up</a></div>

                    <div class="social-login">
                        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google" />
                        <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="Facebook" />
                        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram" />
                    </div>
                </div>
            </div>
        </div>
    </body>
{% endblock %}
