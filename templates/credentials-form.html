{% extends "layout.html" %}

{% block body %}

    <title>Housing&Properties Login Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
      font-family: 'Merriweather', serif;
    }

    .container {
      display: flex;
      flex-direction: row;
      height: 100vh;
    }

    .image-section {
      flex: 1;
      background: url('img/coffee.jpg') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    

    .login-form {
      max-width: 400px;
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
    }

    h1 {
      margin-bottom: 1rem;
      font-size: 2rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
    }

    p {
      margin-bottom: 1rem;
      font-size: 20px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.8rem;
      /* margin: 0.5rem 0; */
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .phone-group {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .phone-group select {
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      width: 35%;
      min-width: 90px;
    }

    .phone-group input[type="tel"] {
      flex: 1;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    #margin-bottom {
      margin-bottom: 18px;
    }

    .requirements {
      margin-bottom: 18px;
    }

    .checkbox {
      margin: 0.5rem 0;
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background-color: #0d0d22;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 1rem 0;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
    }

    .signup {
      text-align: center;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
    }

    .social-login {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .social-login img {
      width: 32px;
      height: 32px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .image-section {
        height: 40vh;
      }
    }
  </style>

    <body>
      <div class="container">
        <div class="image-section">
          <img src="{{ url_for ('static', filename='signupimg2.jpg') }}" alt="Subway scene">
        </div>
        <div class="form-section">
          <div class="login-form">
            <h1>Final Step For Account Recognition!</h1>
            <p>Set a phone number and Password</p>
            <form id="registerForm">
              <div class="phone-group">
                <select name="countryCode">
                  <option value="+234" selected>🇳🇬 +234</option>
                </select>
                <input type="tel" name="phone" placeholder="Phone number" id="phone_number"/>
                <div id="phoneError" class="error" aria-live="polite"></div>
              </div>
              <div id="margin-bottom">
                <input type="password" placeholder="Password" id="password"/>
                <div id="passwordError" class="error" aria-live="polite"></div>
              </div>
              <div id="requirements" class="requirements">
                <div class="requirement">
                  <span id="smallLetter" class="check invalid">❌</span> 1 small letter
                </div>
                <div class="requirement">
                  <span id="capitalLetter" class="check invalid">❌</span> 1 capital letter
                </div>
                <div class="requirement">
                  <span id="number" class="check invalid">❌</span> 1 number   
                </div>
                <div class="requirement">
                  <span id="specialChar" class="check invalid">❌</span> 1 special character
                </div>
                <div class="requirement">
                  <span id="minLength" class="check invalid">❌</span> 8 characters
                </div>
              </div>
              
              <div class="checkbox">
                <label><input type="checkbox" checked /> Keep me logged in</label>
              </div>
              <button type="submit">Submit</button>
            </form>
          </div>
        </div>
      </div>

      <script>

        function showPopup(message, isSuccess, redirectUrl) {
          // send the url passed into this function into the global variable currentUrl

          const modal = document.createElement('div');
          modal.id = 'modal';
          modal.style.position = 'fixed';
          modal.style.top = '50%';
          modal.style.left = '50%';
          modal.style.transform = 'translate(-50%, -50%)';
          modal.style.backgroundColor = isSuccess ? '#d4edda' : '#f8d7da';
          modal.style.padding = '20px';
          modal.style.borderRadius = '5px';
          modal.style.boxShadow = '0 0 10px rgba(0,0,0,0.3)';
          modal.style.zIndex = '1000';
          modal.innerHTML = `
          <p style="color: ${isSuccess ? 'green' : 'red'}; margin: 0;">${message}</p>
          <button id="modalButton" style="margin-top: 10px;">OK</button> `;
          document.body.appendChild(modal);
        }
        document.addEventListener("click", (event) => {
          if (event.target.id ==='modalButton') {
            const modal = document.getElementById("modal");
            if (modal) modal.remove();
            window.location=window.location.pathname;
            // use pushState to avoid page reload
            // // window.history.pushState({}, document.title, window.location.pathname);
            window.location.href = currentRedirectUrl;
          }
        });

        // real time password validation
        document.getElementById("password").addEventListener("input", () => {
          // const passwordRegex = /^(?=.[A-Z])(?=.[a-z])(?=.\d)(?=.[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>?])\S{8,}$/;
          const password = document.getElementById('password').value;
          const smallLetter = document.getElementById('smallLetter');
          const capitalLetter = document.getElementById('capitalLetter');
          const number = document.getElementById('number');
          const specialChar = document.getElementById('specialChar');
          const minLength = document.getElementById('minLength');
          // check each requirement
          smallLetter.textContent = /[a-z]/.test(password) ? '✅' : '❌';
          smallLetter.className = 'check' + ( /[a-z]/.test(password) ? 'valid' : 'invalid');

          capitalLetter.textContent = /[A-Z]/.test(password) ? '✅' : '❌';
          capitalLetter.className = 'check' + ( /[A-Z]/.test(password) ? 'valid' : 'invalid');

          number.textContent = /\d/.test(password) ? '✅' : '❌';
          number.className = 'check' + ( /\d/.test(password) ? 'valid' : 'invalid');

          specialChar.textContent = /[!@#$%^&*()]/.test(password) ? '✅' : '❌';
          specialChar.className = 'check' + ( /[!@#$%^&*()]/.test(password) ? 'valid' : 'invalid');

          minLength.textContent = password.length >= 8 ? '✅' : '❌';
          minLength.className = 'check' + ( password.length >= 8 ? 'valid' : 'invalid');
        });

        // real time phone number validation
        document.getElementById("phone_number").addEventListener('input', function(event) {
          // remove spaces, dashes, parentheses
          // const cleanedPhone = phone_number.replace(/[\s-()]/g, "");
          const phoneInput = event.target;
          const phoneError = document.getElementById("phoneError");
          const originalValue = phoneInput.value;
          // process each character, replace non-digits with ""
          let cleanedValue = "";

          let hasNonDigit = false;
          for (let char of originalValue) {
            // if non-digit is found
            if (/[^0-9]/.test(char)) {
              hasNonDigit = true;
            } else {
              cleanedValue += char;
            }
          }
          // remove prefix 0
          if (cleanedValue.startsWith("0")) {
            cleanedValue = cleanedValue.replace(/^0+/, "");
          } 
          phoneInput.value = cleanedValue;
        });

        // variable to store the token
        let authToken = null;
        // function to get cookie by name
        function getCookie(name) {
          // document.cookie returns a string containing all non-HttpOnly cookies as key-value pairs separated by ;
          // so prepend a ; to the string to make sure every pair is consistently preceded by ;
          const value = `; ${document.cookie}`;
          // this splits the cookie name (social_auth_session) passed through the function, with its value
          const parts = value.split(`; ${name}=`);
          // this isolates the token
          if (parts.length === 2) return parts.pop().split(';').shift();
          return null;
        }
        // on page load extract the token from the cookie. 
        document.addEventListener("DOMContentLoaded", () => {
          // call the getCookie function to provide the name of the cookie ie social_auth_session
          authToken = getCookie("social_auth_session");
          if (!authToken) {
            console.error("No token found in cookie");
            showPopup("No token found in cookie. Try again", true, "/signin");
          } else {
            console.log("Token retrieved:", authToken);
          }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(event) {
          event.preventDefault();
          formSubmitButton();
        });
        async function formSubmitButton() {
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();
          const phone_input = document.getElementById("phone_number").value.trim();
          const country_code = document.getElementById("countryCode").value;
          const phone_number = country_code + phone_input;
          const phoneError = document.getElementById('phoneError');
          const passwordError = document.getElementById('passwordError');
          const smallLetter = document.getElementById('smallLetter');
          const capitalLetter = document.getElementById('capitalLetter');
          const number = document.getElementById('number');
          const specialChar = document.getElementById('specialChar');
          const minLength = document.getElementById('minLength');

          phoneError.textContent = "";

          if (!phone_input) {
            phoneError.textContent = "Phone number may not be blank.";
          } else { 
            let phoneRegex;
            // define regex patterns based on country code
            switch (country_code) {
              case "+234":
                // nigeria: 10 digits beginning with either 7, 8 or 9 and code 234 infront
                phoneRegex = /^\+234[7-9]\d{9}$/;
                break;
              default:
                // // fallback for unsupported country codes eg a malicious manipulation of code in devTools
                phoneRegex = null;
            }
            if (!phoneRegex) {
              phoneError.textContent = "Invalid Phone Number";
            } else if(!phoneRegex.test(phone_number)) {
              // if phoneRegex exists (ie valid country code) it tests countryCode + cleanedPhone against the
              // phoneRegex. This is reinforcing against instances eg if the user types the right initial digit eg 70216 but goes to backspace
              phoneError.textContent = "invalid phone number";
            }
          }  
          if (phoneError.textContent || smallLetter.innerHTML !== "✅" || capitalLetter.innerHTML !== "✅" ||
            number.innerHTML !== "✅" || specialChar.innerHTML !== "✅" || minLength.innerHTML !== "✅") {
            return;
          }
          if (!authToken) {
            console.error("No token available for request");
            alert ("Authentication token is missing. Please try again");
            return;
          }
          const userData = { 
            password: password,
            phone_number: phone_number,
          };
          try {
            const url = 'https://hp-test-7rmp.onrender.com/api/v1/users/update-social-data/';
            const response = await fetch(url, {
              method: 'PUT',
              headers: {
                // after the google reg, the redirect url back to this page done by the backend, contains a social auth
                // header token, which will be extracted and sent when making this PUT request
                "Authorization": `Bearer ${authToken}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(userData),
            });
            if (response.ok) {
            // the response body is a valid json if the response is ok else use await response.text()
            const data = await response.json();
            // check the user_type to redirect to appropriate dashboards
            const user_type = data.data.user.user_type;
            if (user_type) {
              console.log(data);
              if (user_type === "BUYER") {
                window.location.href = "/homepage";
              } else if (user_type === "LAND_AGENT") {
                  window.location.href = "/landagent_profilepage";
              } else if (user_type === "HOUSE_AGENT") {
                  window.location.href = "/houseagent_profilepage";
              } else if (user_type === "VENDOR") {
                  window.location.href = "/vendor_profilepage";
              } else if (user_type === "SERVICE_PROVIDER") {
                  window.location.href = "/homepage";
              }
            } else {
              showPopup("Something went wrong. Please log in.", true, "/credentials_form");
            }
          } else {
            // Handle other non-2xx status codes
            const errorText = await response.text(); // Use .text() to avoid JSON parsing errors
            if (response.status === 409) {
              showPopup("Account exists. Please log in", true, "/signin");
            } else {
              console.error('An error occurred. Please try again', response.status, errorText);
              showPopup(`An error occurred. Please try again: ${errorText}`, false, "/credentials_form");
            }
          }

          } catch (error) {
            showPopup('An error occurred. Please try again', false, "/credentials_form");
          } finally {
            document.getElementById('registerForm').querySelector('button').disabled = false; // Re-enable button
          }
        }  
      </script>
