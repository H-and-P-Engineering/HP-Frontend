{% extends "layout.html" %}

{% block body %}
  <style>
    .spinner {
      position: fixed;
      width: 30px;
      height: 30px;
      top: 50%;
      left: 50%;
      z-index: 1000;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear;
    }
    @keyframes spin {
      0% { transform: rotate (0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <body>
    <div>
      <h1>Redirecting Existing account to dashboard...</h1>
      <p>wait a sec..</p>
      <div id="spinner" class="spinner"></div>
    </div>


    <script>
          
      let currentRedirectUrl = '';
      function showPopup(message, isSuccess, redirectUrl) {
        // send the url passed into this function into the global variable currentUrl
        currentRedirectUrl = redirectUrl;
        const modal = document.createElement('div');
        modal.id = 'modal';
        modal.style.position = 'fixed';
        modal.style.top = '50%';
        modal.style.left = '50%';
        modal.style.transform = 'translate(-50%, -50%)';
        modal.style.backgroundColor = isSuccess ? '#d4edda' : '#f8d7da';
        modal.style.padding = '20px';
        modal.style.borderRadius = '5px';
        modal.style.boxShadow = '0 0 10px rgba(0,0,0,0.3)';
        modal.style.zIndex = '1000';
        modal.innerHTML = `
        <p style="color: ${isSuccess ? 'green' : 'red'}; margin: 0;">${message}</p>
        <button id="modalButton" style="margin-top: 10px;">OK</button> `;
        document.body.appendChild(modal);
      }
      document.addEventListener("click", (event) => {
        if (event.target.id ==='modalButton') {
          const modal = document.getElementById("modal");
          if (modal) modal.remove();
          window.location=window.location.pathname;
          // use pushState to avoid page reload
          // window.history.pushState({}, document.title, window.location.pathname);
          window.location.href = currentRedirectUrl;
        }
      });
      window.addEventListener('load', async () => {
        console.log("page load event fired");
        console.log(window.location.pathname);
        try {
          // call this function defined elswehere
          const userData = await fetchUserData();
          console.log("Fetched user data:", userData);
          if (userData) {
            console.log(userData);
            // destructure the object userData and extracts property user from it
            const {user} = userData;
            //store user data eg to use the name in the homepage eg 'Welcome Jeffrey'
            // sessionStorage only accepts strings as values so the user object from backend is convertes to string
            const is_new = user.is_new;
            const user_type = user.user_type;
            // sessionStorage.setItem('user', JSON.stringify(user));
            localStorage.setItem('access', userData.access);
            localStorage.setItem('refresh', userData.refresh);
            if(user_type) {
              if (user_type === "BUYER") {
                window.location.href = "/homepage";
              } else if (user_type === "LAND_AGENT") {
                window.location.href = "/landagent_profilepage";
              } else if (user_type === "HOUSE_AGENT") {
                window.location.href = "/houseagent_profilepage";
              } else if (user_type === "VENDOR") {
                window.location.href = "/vendor_profilepage";
              } else if (user_type === "SERVICE_PROVIDER") {
                window.location.href = "/homepage";
              }
            } 
          } else {
            // if userData is = null
            showPopup("No userData: Account already exists. Please login", true, "/signin");
          }
        } catch (error) {
          console.log("inability to complete, EBUBE");
          document.getElementById("ErrorMessage").textContent = "Unable to fetch API to start Google auth. Please try again";
          //  showPopup("Unable to fetch user data API. Please try again", true, "/createaccount");
        }            
      });
      // this function fetches user data and user_type (to redirect to their dashboard) after backend 
      // redirects to it ie when an existing google registered user tries to sign up or login via google
      async function fetchUserData() {
        try {
          console.log("attempting to fetch userdata from API");
          // this API requires authentication through a session stored in cookie, sent after social/end API redirects
          // to the createaccount-user page. expired cookie could lead to the server rejecting the request(401, 403)
          // this cookie contains token used to identify a user in database to be able to send their data
          const response = await fetch('https://hp-test-7rmp.onrender.com/api/v1/authentication/social/data/', {
            method: 'GET',
            credentials: 'include'
          });
          if (response.ok) {         
            const data = await response.json();
            console.log(data);
            console.log("fetch response:", response.status);
            if (data.data.user.is_new === false) {
              return {
                // user contains is_new flag, user_type etc
                user: data.data.user,
                access: data.data.access,
                refresh: data.data.refresh,
              };
            } else {
              showPopup("Something went wrong. Please try again", true, "/signin");
            }
          } else {
            console.log(response);
            showPopup("Response is not ok. Please try again", true, "/signin");
            // window.location.href = '/error';
            // return null;
          }
        } catch (error) {
          console.log(error);
          console.log("Unable to fetch API to get user google data. Please try again");
          // document.getElementById("redirectMessage").classList.add = "blockDisplay";
          showPopup("Unable to fetch API to get userData. Please try again", true, "/signin");
        }
      }
    </script>
  </body>

{% endblock %}
