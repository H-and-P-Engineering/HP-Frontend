{% extends "layout.html" %}

{% block body %}
  
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Merriweather', serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: row;
      flex: 1;
    }

    .left-pane {
      flex: 1;
    }

    .left-pane img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .right-pane {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
      background-color: #fff;
    }

    .form-container {
      max-width: 400px;
      width: 100%;
    }

    .form-container h1 {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 18px 0;
      line-height: 1.5;
      letter-spacing: 0.5px;
    }

    .form-container p {
      font-size: 16px;
      margin-bottom: 26px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: 0.4px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select[name="Users"] {
      width: 100%;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    #margin-bottom {
      margin-bottom: 18px;
    }
    .phone-group {
      display: flex;
      gap: 10px;
    }

    .phone-group select {
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      width: 35%;
      min-width: 90px;
    }

    .phone-group input[type="tel"] {
      flex: 1;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    #password-container {
      position: relative;
      margin-bottom: 18px;
    }
    #toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #666;
    }
    #toggle-password:hover {
      color: #000;
    }
    
    .requirements {
      margin-bottom: 18px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      margin-bottom: 22px;
      font-size: 14px;
    }

    .checkbox input {
      margin-right: 10px;
    }

    .button {
      background-color: #0d1b2a;
      color: white;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
    }

    .login {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
    }

    .login a {
      color: #0d1b2a;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }

    hr {
      margin: 30px 0;
      border: none;
      border-top: 1px solid #ddd;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .social-icons img {
      width: 48px;
      height: 48px;
      cursor: pointer;
    }

    .spinner {
      display: none;
      position: fixed;
      width: 50px;
      height: 50px;
      top: 50%;
      left: 50%;
      z-index: 1000;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate (0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left-pane,
      .right-pane {
        width: 100%;
      }

      .left-pane img {
        height: 250px;
      }

      .right-pane {
        padding: 20px;
      }

      .phone-group {
        flex-direction: column;
        margin-bottom: 18px;
      }

      .phone-group select,
      .phone-group input[type="tel"] {
        width: 100%;
      }
    }
  </style>

    <h1>Authenticating....</h1>
  </div>
  <div id="errorMessage"></div>
  <div class="container" id="container">

    <div class="right-pane">

        <h1>Let's get you started on <br><strong>Housing&Properties</strong></h1>
        <p>Create your account in a second</p>
        <form action="{{ url_for ('homepage') }}" method="post" id="registerForm">
          <div id="margin-bottom">
            <select name="Users" id="userType">
              <option disabled selected value="">User type</option>
              <option value="BUYER">Buyer</option>
              <option value="LAND_AGENT">Land Agent</option>
              <option value="HOUSE_AGENT">House Agent</option>
              <option value="VENDOR">Vendor</option>
              <option value="SERVICE_PROVIDER">Offer Service</option>
            </select>
            <div id="userTypeError" class="error" aria-live="polite"></div>
          </div>
          
          <div id="margin-bottom">
            <input type="text" placeholder="First Name" id="first_name"/>
            <div id="firstNameError" class="error" aria-live="polite"></div>
          </div>

          <div id="margin-bottom">
            <input type="text" placeholder="Last Name" id="last_name"/>
            <div id="lastNameError" class="error" aria-live="polite"></div>
          </div>

          <div id="margin-bottom">
            <div class="phone-group">
              <select name="countryCode" id="countryCode">
                <option value="+234" selected>🇳🇬 +234</option>
              </select>
              <input type="tel" name="phone" placeholder="Phone Number" id="phone_number" maxlength="10"/>
            </div>
            <div id="phoneError" class="error"></div>
          </div>

          <div id="margin-bottom">
            <input type="email" placeholder="Email Address" id="email"/>
            <div id="emailError" class="error" aria-live="polite"></div>
          </div>

          <div id="password-container">
            <input type="password" placeholder="Create Password" id="password"/>
            <!-- nb: fas is a prefix not a class. without this the icons might not display -->
            <i class="fas fa-eye" id="toggle-password"></i>
            <div id="passwordError" class="error" aria-live="polite"></div>
          </div>
          <div id="requirements" class="requirements">
            <div class="requirement">
              <span id="smallLetter" class="check invalid">❌</span> 1 small letter
            </div>
            <div class="requirement">
              <span id="capitalLetter" class="check invalid">❌</span> 1 capital letter
            </div>
            <div class="requirement">
              <span id="number" class="check invalid">❌</span> 1 number

            <div class="requirement">
              <span id="specialChar" class="check invalid">❌</span> 1 special character
            </div>
            <div class="requirement">
              <span id="minLength" class="check invalid">❌</span> 8 characters
            </div>
          </div>

          <!-- <div id="passwordError" class="error" aria-live="polite"></div> -->

          <div class="checkbox">
            <input type="checkbox"/>
            <label>I agree to the terms and privacy policy</label>
          </div>

          <button class="button" type="submit">Create an account</button>
        </form>

        </div>

      </div>
    </div>
  </div>
  <div id="spinner" class="spinner"></div>
</body>

      // toggle the eye icon
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });

    let currentRedirectUrl = '';
    function showPopup(message, isSuccess, redirectUrl) {
      // send the url passed into this function into the global variable currentUrl
      currentRedirectUrl = redirectUrl;
      const modal = document.createElement('div');
      modal.id = 'modal';
      modal.style.position = 'fixed';
      modal.style.top = '50%';
      modal.style.left = '50%';
      modal.style.transform = 'translate(-50%, -50%)';
      modal.style.backgroundColor = isSuccess ? '#d4edda' : '#f8d7da';
      modal.style.padding = '20px';
      modal.style.borderRadius = '5px';
      modal.style.boxShadow = '0 0 10px rgba(0,0,0,0.3)';
      modal.style.zIndex = '1000';
      modal.innerHTML = `
      <p style="color: ${isSuccess ? 'green' : 'red'}; margin: 0;">${message}</p>
      <button id="modalButton" style="margin-top: 10px;">OK</button> `;
      document.body.appendChild(modal);
    }
    document.addEventListener("click", (event) => {
      if (event.target.id ==='modalButton') {
        const modal = document.getElementById("modal");
        if (modal) modal.remove();
        window.location=window.location.pathname;
        // use pushState to avoid page reload
        // // window.history.pushState({}, document.title, window.location.pathname);
        window.location.href = currentRedirectUrl;
      }
    });
