{% extends "layout.html" %}

{% block body %}

    <title>Email Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .spinner {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear;
        }
        @keyframes spin {
            0% { transform: rotate (0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
    </style>
    <body>
        <div class="container">
            <h1 id="title">Registration and verification </h1>
            <p id="message">Processing</p>
            <div id="spinner" class="spinner"></div>
        </div>
        


        <script>
            // function to extract user_uuid and verification_token from the url. Called in initializePage() and
            // verifyEmail()
            function getQueryFromUrl() {
                const query = new URLSearchParams(window.location.search);
                return {
                    user_uuid: query.get("user_uuid"),
                    verification_token: query.get("verification_token"),
                };
            }
            function showMessage(text, isError = false, title = null) {
                const messageElement = document.getElementById("message");
                messageElement.textContent = text;
                messageElement.className = isError ? "error" : "success";
                if(title) {
                    document.getElementById("title").textContent = title;
                }
            }
            // function to show spinner. Called when fetching the API in verifyEmail()
            function toggleSpinner(show) {
                document.getElementById("spinner").style.display = show ? "block" : "none";
            }
            // initializePage() first checks for the query parameters (sent via the url clicked in email,
            //  which is sent on second page load (from server)) before calling this function
            async function verifyEmail() {
                const {user_uuid, verification_token} = getQueryFromUrl();
                if (!user_uuid || verification_token) {
                    console.log("no verification token provided.");
                    showMessage("Missing verification parameters.", true, "Verification Error");
                    return;
                }
                showMessage("Verifying your Email...", false, "Email Verification");
                toggleSpinner(true);
                // this is how the verification happens: the backend generates a verification_token valid for the 
                // intended user, it stores the token in cache and uses the user_uuid to quickly locate the
                // user record and checks if the provided token (in API) matches the stored token in cache
                const url = `https://hp-test-7rmp.onrender.com/api/v1/authentication/verify-email/{user_uuid}/{verification_token}/`;
                try {
                    const response = await fetch (url, {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                    });
                    const data = await response.json();
                    toggleSpinner(false);
                    if (response.ok) {
                        console.log(data);
                        console.log(response);
                        localStorage.setItem("authToken", data.sessionToken);
                        // redirect to dashboards based on user_type
                        const userType = data.user_type;
                        if (userType === "CLIENT") {
                            window.location.href = "homepage";
                        }
                        if (userType === "land agent") {
                            window.location.href = "land_agent_homepage";
                        }
                        if (userType === "house agent") {
                            window.location.href = "housing_agent_homepage";
                        }
                        if (userType === "vendor") {
                            window.location.href = "vendor_homepage";
                        }
                        if (userType === "service") {
                            window.location.href = "homepage";
                        }
                        showMessage("Unknown user type. Please contact support", true);
                    } else {
                        showMessage(data.message || "Verification failed. Invalid or expired token.", true);
                    }
                } catch (error) {
                    toggleSpinner(false);
                    showMessage("An error occurred. Please try again later.", true);
                    console.error("Verification error:", error);
                }
            }
            // page behaviour function. checks for availability of token before calling the verifyEmail()
            function initializePage() {
                const {user_uuid, verification_token} = getQueryFromUrl();
                if (user_uuid && verification_token) {
                    // send them to the API
                    verifyEmail();
                } else {
                    showMessage("Please check your email (including spam) for a verification link.",
                        false, "Registration Successful"
                    );
                }
            }
            // run the initializePage() on page load
            document.addEventListener("DOMContentLoaded", initializePage);
        </script>
    </body>

{% endblock %}
